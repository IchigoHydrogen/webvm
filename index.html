<!DOCTYPE html>
<html lang="en" style="height:100%;">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal WebVM</title>
    <link rel="stylesheet" href="./xterm/xterm.css" />
    <link rel="stylesheet" href="./scrollbar.css" />
    <script src="./xterm/xterm.js"></script>
    <script src="./xterm/xterm-addon-fit.js"></script>
    <script src="network.js"></script>
  </head>

  <body style="margin:0;height:100%;background:black;color:white;overflow:hidden;">
    <div id="console" style="width:100%;height:100%;"></div>
    <script>
      var consoleDiv = document.getElementById("console");
      var term = new Terminal({cursorBlink:true,convertEol:true, fontFamily:"monospace", fontWeight: 400, fontWeightBold: 700});
      var fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(consoleDiv);
      term.scrollToTop();
      fitAddon.fit();
      window.addEventListener("resize", function(ev){fitAddon.fit();}, false);
      term.focus();
      var cxReadFunc = null;
      function writeData(buf)
      {
        term.write(new Uint8Array(buf));
      }
      function readData(str)
      {
        if(cxReadFunc == null)
          return;
        for(var i=0;i<str.length;i++)
          cxReadFunc(str.charCodeAt(i));
      }
      term.onData(readData);

      function runBash()
      {
        var cmd = "/bin/bash";
        var args = ["--login"];
        var env = ["HOME=/home/user", "TERM=xterm", "USER=user", "SHELL=/bin/bash", "EDITOR=vim", "LANG=en_US.UTF-8", "LC_ALL=C"];
        var cwd = "/home/user";
        const structure = {
          cmd: cmd,
          args: args,
          env: env,
          cwd: cwd
        }
        if (typeof SharedArrayBuffer === "undefined")
        {
          term.write("Error: SharedArrayBuffer is not supported in your browser.\n");
          return;
        }

        async function runTest(cx)
        {
          term.scrollToBottom();
          cxReadFunc = cx.setCustomConsole(writeData, term.cols, term.rows);
          var opts = {env:structure.env, cwd:structure.cwd, uid: 1000, gid: 1000};
          
          // Run yuki_n.py script
          await cx.run("/usr/bin/python3", ["examples/python3/yuki_n.py"], opts);
          
          while (true)
          {
            await cx.run(structure.cmd, structure.args, opts);
          }
        }
        function failCallback(err)
        {
          term.write("Error: " + err + "\n");
        }
        CheerpXApp.create({devices:[{type:"ext2",url:"IMAGE_URL",name:"block1"}],mounts:[{type:"ext2",dev:"block1",path:"/"},{type:"cheerpOS",dev:"/app",path:"/app"},{type:"cheerpOS",dev:"/str",path:"/data"},{type:"devs",dev:"",path:"/dev"}]}).then(runTest, failCallback);
      }
      async function loadCX()
      {
        var r = await fetch("https://cheerpxdemos.leaningtech.com/publicdeploy/LATEST.txt");
        var url = await r.text();
        url = url.trim();
        var script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = url;
        script.addEventListener("load", runBash, false);
        document.head.appendChild(script);
      }
      loadCX();
    </script>
  </body>
</html>
